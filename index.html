*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#fff;}
.wrap{max-width:1400px;margin:0 auto;padding:20px clamp(16px,3vw,48px) 32px;}
.header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;}
.header h1{font-size:16px;font-weight:500;}
.header small{font-size:11px;color:#777;}
.fx{display:inline-flex;align-items:center;gap:10px;background:#f4f4f4;border-radius:8px;padding:6px 14px;margin-bottom:12px;}
.fx label{font-size:11px;color:#777;}
.fx input{width:62px;font-size:12px;padding:4px 7px;border:1.5px solid #ccc;border-radius:5px;background:#fff;color:#1a1a1a;font-family:inherit;}
.fx-val{font-size:12px;color:#1a6fc4;font-weight:500;}
.fx-btn{font-size:11px;padding:4px 9px;border:1px solid #ccc;border-radius:5px;background:#fff;color:#555;cursor:pointer;}
.fx-btn:hover{background:#f0f0f0;}
.fx-status{font-size:10px;color:#aaa;}
/* War banner */
.war-banner{display:flex;align-items:center;gap:12px;background:#fff3cd;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;}
.war-banner strong{font-size:12px;color:#7a5500;}
.war-banner span{font-size:11px;color:#7a5500;}
.war-toggle{display:flex;align-items:center;gap:6px;margin-left:auto;}
.war-toggle label{font-size:11px;color:#7a5500;font-weight:500;cursor:pointer;}
.war-toggle input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#d4a800;}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:24px;flex-wrap:wrap;}
.tab{padding:8px 16px;font-size:12px;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab:hover{color:#1a1a1a;}
.tab.on{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500;}
.panel{display:none;}.panel.on{display:block;}
.slabel{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#999;margin:24px 0 10px;}
.slabel:first-child{margin-top:0;}
/* Simulator */
.sim-section{background:#f7f7f7;border-radius:10px;padding:16px 18px;margin-bottom:16px;}
.sim-section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#666;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sim-section-title .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
.sim-field{display:flex;flex-direction:column;gap:5px;}
.sim-field label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#666;}
.sim-field select,
.sim-field input[type=number]{font-size:13px;padding:9px 11px;border:1.5px solid #bbb;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;width:100%;}
.sim-field select:hover,.sim-field input[type=number]:hover{border-color:#888;}
.sim-field select:focus,.sim-field input[type=number]:focus{outline:none;border-color:#1a6fc4;background:#fff;box-shadow:0 0 0 3px rgba(26,111,196,.10);}
.sim-field select.color-vinyl{border-color:#d4a800;background:#fffbf0;}
/* Result */
.palier-tag{display:inline-block;font-size:12px;font-weight:500;padding:5px 14px;border-radius:999px;}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:4px;}
.metric{background:#f4f4f4;border-radius:8px;padding:12px 14px;}
.metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#999;margin-bottom:5px;}
.metric-val{font-size:17px;font-weight:500;color:#1a1a1a;}
.metric-eur{font-size:11px;color:#1a6fc4;margin-top:2px;}
.metric.big{background:#dbeeff;}
.metric.big .metric-val{font-size:22px;color:#1a4f8a;}
.metric.big .metric-eur{font-size:13px;color:#1a4f8a;}
.metric.war{background:#fff3cd;}
.metric.war .metric-val{color:#7a5500;}
.metric.war .metric-eur{color:#7a5500;}
.metric.color{background:#f3e8ff;}
.metric.color .metric-val{color:#6b21a8;}
.metric.color .metric-eur{color:#6b21a8;}

.palier-sub{font-size:12px;color:#777;}
.palier-eur{font-size:12px;color:#1a6fc4;}
.palier-rows{display:flex;flex-direction:column;gap:5px;}
.palier-row{display:flex;align-items:center;gap:10px;}
.palier-cat{font-size:11px;font-weight:500;min-width:90px;}
.bar-track{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.palier-qty{font-size:11px;font-weight:500;min-width:55px;text-align:right;}
.palier-refs{font-size:10px;color:#aaa;min-width:100px;}
.palier-title{font-size:10px;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
/* Rate cards */
.rate-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px;}
.rate-card{background:#f4f4f4;border-radius:8px;padding:10px 12px;}
.rate-label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.rate-val{font-size:14px;font-weight:500;}
.rate-eur{font-size:11px;color:#1a6fc4;margin-top:1px;}
.rate-range{font-size:10px;color:#bbb;margin-top:2px;}
/* Tables */
table{width:100%;border-collapse:collapse;}
th,td{padding:7px 10px;text-align:right;font-size:12px;border-bottom:1px solid #eee;}
th{font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#999;background:#f7f7f7;}
th.l,td.l{text-align:left;}
td.muted{color:#888;}
td.gbp{font-weight:500;}

td.g{color:#2a7a2a;font-weight:500;}
td.r{color:#b92020;font-weight:500;}
td.purple{color:#6b21a8;font-weight:500;}

tr.strong td{font-weight:500;border-top:1px solid #ccc;}

.b-fx{background:#eee;color:#666;}

.note-box{padding:10px 14px;background:#f3e8ff;border-radius:8px;font-size:11px;color:#6b21a8;line-height:1.6;margin-bottom:14px;border:1px solid #d8b4fe;}

function varT(d){return Object.values(d.r).reduce((a,b)=>a+b,0)*d.qty;}
function fixT(d){return Object.values(d.f).reduce((a,b)=>a+b,0)+(d.extra||0);}
function warOn(){return document.getElementById('war-check')&&document.getElementById('war-check').checked;}

function getReleases(){
  const map={};
  ALL.filter(d=>d.qty>0&&d.r.press>0).forEach(d=>{
    const key=d.cat+'_'+d.vinyl;
    if(!map[key])map[key]={cat:d.cat,fmt:d.fmt,vinyl:d.vinyl,refs:[],qty:0,press:d.r.press};
    map[key].refs.push(d.ref);map[key].qty+=d.qty;
  });
  return Object.values(map).sort((a,b)=>a.press-b.press||b.qty-a.qty);
}

function pressRate(fmt,vinyl,qty){
  if(fmt==='7')return 0.95;
  if(vinyl==='color'){
    if(qty>=2000)return 1.50;
    return 1.55;
  }
  if(qty>=1500)return 0.88;
  if(qty>=500)return 0.97;
  return 1.25;
}

function calcSim(){
  const el=id=>document.getElementById(id);
  if(!el('s-fmt'))return;
  const fmt=el('s-fmt').value;
  const vinyl=el('s-vinyl').value;
  const qty=parseInt(el('s-qty').value)||300;
  const press=pressRate(fmt,vinyl,qty);
  const inner=parseFloat(el('s-inner').value)||0;
  const sleeve=parseFloat(el('s-sleeve').value)||0;
  const lbl=parseFloat(el('s-label').value)||0;
  const sticker=parseFloat(el('s-sticker').value)||0;
  const ovebag=parseFloat(el('s-ovebag').value)||0;
  const varnish=parseFloat(el('s-varnish').value)||0;
  const gatefold_glue=parseFloat(el('s-gatefold-glue').value)||0;
  const diecut=parseFloat(el('s-diecut').value)||0;
  const pantone=parseFloat(el('s-pantone').value)||0;
  const colorsetup=parseFloat(el('s-colorsetup').value)||0;
  const del=parseFloat(el('s-del').value)||85;
  const fixedMode=el('s-fixed').value;
  const war=warOn()?WAR:0;
  const pack=0.055,energy=0.18;
  // Pour vinyle noir, energy standard = 0.08; pour coloré = 0.18 (déjà intègre surcharge)
  const energyActual=vinyl==='color'?energy:(0.08+war);
  const shrink=vinyl==='black'?0.14:0;
  const pu=press+lbl+inner+sleeve+gatefold_glue+pack+shrink+energyActual+varnish+sticker+ovebag;
  const vt=pu*qty;
  const mf=fmt==='7'?160:212;
  const metalwork=fixedMode==='yes_lacquer'?280:159;
  const ft=fixedMode==='no'?0:(mf+metalwork+25+35);
  const extraFixed=diecut+pantone+colorsetup;
  const total=vt+ft+del+extraFixed;
  const isColor=vinyl==='color';
  const pBg=press<=0.88?'#d4edda':press<=0.97?'#dbeeff':isColor?'#f3e8ff':'#fde8e8';
  const pFg=press<=0.88?'#1a5a1a':press<=0.97?'#1a4f8a':isColor?'#6b21a8':'#8a1a1a';

  const warNote=war>0&&vinyl==='black'?` + surcharge guerre £0.09/u`:'';
  const colorNote=vinyl==='color'?` · Energy surcharge £0.18 déjà inclus dans le devis`:'';
  el('sim-result').innerHTML=`
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:16px 0 14px;">
    <span class="palier-tag" style="background:${pBg};color:${pFg};">${plbl}</span>
    <span style="font-size:11px;color:#888;">pour ${qty.toLocaleString()} ex.</span>
    ${diecut>0?`<span class="palier-tag" style="background:#fff3cd;color:#7a5500;">+ die-cut £400</span>`:''}
    ${pantone>0?`<span class="palier-tag" style="background:#fff3cd;color:#7a5500;">+ Pantone sleeve £100</span>`:''}
    ${colorsetup>0?`<span class="palier-tag" style="background:#f3e8ff;color:#6b21a8;">+ colour set up £100</span>`:''}
    ${gatefold_glue>0?`<span class="palier-tag" style="background:#f3e8ff;color:#6b21a8;">+ gatefold collé £0.1365/u</span>`:''}
    ${war>0&&vinyl==='black'?`<span class="palier-tag" style="background:#fff3cd;color:#7a5500;">+ surcharge guerre £0.09/u</span>`:''}
  </div>
  ${isColor?`<p style="font-size:11px;color:#6b21a8;margin-bottom:12px;">⚠ Vinyle coloré : metalwork from supplied lacquers (£280 vs £159), machine colour set up (£100), energy surcharge déjà à £0.18/u dans les devis.</p>`:''}
  <div class="metrics">
    <div class="metric${isColor?' color':''}"><div class="metric-label">Pressage / u</div><div class="metric-val">${fpu(press)}</div><div class="metric-eur">${epu(press)}</div></div>

  <tr class="strong"><td class="l">Total fixes typique (coloré)</td><td class="gbp">£640</td><td class="eur">${fe(640)}</td><td class="l muted" style="color:#6b21a8;">Metalwork £280 + set up £100 + Pantone £100 + tests £60 + livr. tests £35 = £575 hors livr.</td></tr>
  </tbody></table>`;
  document.getElementById('panel-rates').innerHTML=h;
}

// ── RELEASES ──
function renderReleases(){
  const rels=getReleases();
  let h=`<table><thead><tr><th class="l">Cat. N°</th><th class="l">Titre</th><th>Fmt</th><th>Vinyle</th><th>Qté totale</th><th>Press/u £</th><th>Press/u €</th><th>Palier</th><th class="l">Docs</th></tr></thead><tbody>`;
  rels.forEach(r=>{
    const isColor=r.vinyl==='color';
    const palier=r.press<=0.88?'A ≥1500 noir':r.press===0.95?'7"':r.press<=0.97?'B 500–1499 noir':r.press<=1.02?'B\' die-cut':r.press<=1.50?'Coloré ≥2000':r.press<=1.55?'Coloré 1000–1999':'C ≤499 noir';
    const cls=r.press<=0.88?'g':r.press>=1.25&&!isColor?'r':isColor?'purple':'';
    h+=`<tr><td class="l" style="font-weight:500;">${r.cat}</td><td class="l muted" style="font-size:11px;">${T(r.cat)||'—'}</td><td>${r.fmt}"</td><td>${isColor?'<span class="badge b-color">Coloré</span>':'Noir'}</td><td style="font-weight:500;">${r.qty.toLocaleString()}</td><td class="${cls}">${fpu(r.press)}</td><td class="eur">${epu(r.press)}</td><td style="font-size:10px;">${palier}</td><td class="l muted" style="font-size:10px;">${r.refs.join(', ')}</td></tr>`;
  });
  h+='</tbody></table>';
  const fixOnly=[...new Set(ALL.filter(d=>d.qty===0&&d.type==='inv').map(d=>d.cat))];
  h+=`<p style="font-size:10px;color:#bbb;margin-top:12px;">Factures coûts fixes uniquement : ${fixOnly.map(c=>`${c}${T(c)?' ('+T(c)+')':''}`).join(' · ')}</p>`;
  document.getElementById('panel-releases').innerHTML=h;
}

// ── FACTURES ──
function renderInvoices(){
  let h=`<table><thead><tr><th class="l">Réf.</th><th class="l">Cat.</th><th class="l">Titre</th><th>Date</th><th>Vinyle</th><th>Qté</th><th>Press/u</th><th>Total £</th><th>Total €</th></tr></thead><tbody>`;
  ALL.forEach(d=>{
    const tag=d.qty===0?'<span class="badge b-fx">Fixes</span>':d.fmt==='7'?'<span class="badge b-7">7"</span>':d.type==='quote'?'<span class="badge b-qt">Devis</span>':'<span class="badge b-inv">Facture</span>';
    const dieTag=d.extra>0&&d.extraItems&&d.extraItems.some(x=>x.includes('Die'))?'<span class="badge" style="background:#fff3cd;color:#7a5500;">die-cut</span>':'';
    const colorTag=d.vinyl==='color'?'<span class="badge b-color">coloré</span>':'';
    h+=`<tr><td class="l" style="font-weight:500;white-space:nowrap;">${d.ref}${tag}${dieTag}${colorTag}</td><td class="l" style="font-size:11px;">${d.cat}</td><td class="l muted" style="font-size:10px;">${T(d.cat)||'—'}</td><td style="font-size:10px;">${d.date||'—'}</td><td style="font-size:10px;">${d.vinyl==='color'?'<span style="color:#6b21a8;">Coloré</span>':'Noir'}</td><td>${d.qty||'—'}</td><td>${d.r.press>0?fpu(d.r.press):'—'}</td><td class="gbp">${f2(d.total)}</td><td class="eur">${fe(d.total)}</td></tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('panel-invoices').innerHTML=h;
}

// ── IMPORT ──
function renderImport(){
  document.getElementById('panel-import').innerHTML=`
  <p style="font-size:12px;color:#888;margin-bottom:16px;">Les doublons (même référence) sont ignorés automatiquement.</p>
  <div class="import-grid">
    <div class="import-field"><label>Réf.</label><input type="text" id="i-ref" placeholder="i28xxx"></div>
    <div class="import-field"><label>Type</label><select id="i-type"><option value="inv">Facture</option><option value="quote">Devis</option></select></div>
    <div class="import-field"><label>Date</label><input type="text" id="i-date" placeholder="MM/YYYY"></div>
    <div class="import-field"><label>Format</label><select id="i-fmt"><option value="12">12"</option><option value="7">7"</option></select></div>
    <div class="import-field"><label>Vinyle</label><select id="i-vinyl"><option value="black">Noir</option><option value="color">Coloré</option></select></div>
    <div class="import-field"><label>Cat. N°</label><input type="text" id="i-cat" placeholder="CAPXXXLP"></div>
    <div class="import-field" style="grid-column:span 2"><label>Titre</label><input type="text" id="i-title" placeholder="Artiste — Titre"></div>
    <div class="import-field"><label>Quantité</label><input type="number" id="i-qty" placeholder="300"></div>
  </div>
  <div class="slabel">Tarifs unitaires (£/u)</div>
  <div class="import-grid">
    <div class="import-field"><label>Pressage</label><input type="number" id="c-press" step="0.01" placeholder="0.97"></div>
    <div class="import-field"><label>Labels</label><input type="number" id="c-label" step="0.01" placeholder="0.20"></div>
    <div class="import-field"><label>Inner</label><input type="number" id="c-inner" step="0.01" placeholder="0.09"></div>
    <div class="import-field"><label>Sleeve</label><input type="number" id="c-sleeve" step="0.001" placeholder="0.83"></div>
    <div class="import-field"><label>Packing</label><input type="number" id="c-pack" step="0.01" placeholder="0.055"></div>
    <div class="import-field"><label>Shrink</label><input type="number" id="c-shrink" step="0.01" placeholder="0.14"></div>
    <div class="import-field"><label>Energy</label><input type="number" id="c-energy" step="0.01" placeholder="0.08"></div>
    <div class="import-field"><label>Varnish</label><input type="number" id="c-varnish" step="0.01" placeholder="0"></div>
    <div class="import-field"><label>Sticker+appli</label><input type="number" id="c-sticker" step="0.01" placeholder="0.33"></div>
    <div class="import-field"><label>PVC Ovebag</label><input type="number" id="c-ovebag" step="0.01" placeholder="0"></div>
  </div>
  <div class="slabel">Coûts fixes (£)</div>
  <div class="import-grid">
    <div class="import-field"><label>Mastering/Lacquers</label><input type="number" id="f-master" step="1" placeholder="212"></div>
    <div class="import-field"><label>Metalwork</label><input type="number" id="f-metal" step="1" placeholder="159"></div>
    <div class="import-field"><label>Tests</label><input type="number" id="f-tests" step="1" placeholder="25"></div>
    <div class="import-field"><label>Livr. tests</label><input type="number" id="f-testdel" step="1" placeholder="35"></div>
    <div class="import-field"><label>Livr. march.</label><input type="number" id="f-delivery" step="1" placeholder="85"></div>
    <div class="import-field"><label>Die-cut</label><input type="number" id="f-diecut" step="1" placeholder="0"></div>
    <div class="import-field"><label>Colour set up</label><input type="number" id="f-colorsetup" step="1" placeholder="0"></div>
    <div class="import-field"><label>Pantone surcharge</label><input type="number" id="f-pantone" step="1" placeholder="0"></div>
    <div class="import-field"><label>Total doc £</label><input type="number" id="c-total" step="0.01"></div>
  </div>
  <button class="add-btn" onclick="addDoc()">+ Ajouter</button>
  <p class="msg" id="import-msg"></p>`;
}

function addDoc(){
  const ref=document.getElementById('i-ref').value.trim()||('DOC-'+Date.now());
  if(ALL.find(d=>d.ref===ref)){document.getElementById('import-msg').textContent='⚠ Doublon ignoré.';return;}
  const gg=id=>parseFloat(document.getElementById(id).value)||0;
  const extraFixed=gg('f-diecut')+gg('f-colorsetup')+gg('f-pantone');
  const d={ref,type:document.getElementById('i-type').value,date:document.getElementById('i-date').value||'',fmt:document.getElementById('i-fmt').value,vinyl:document.getElementById('i-vinyl').value,cat:document.getElementById('i-cat').value||'—',qty:parseInt(document.getElementById('i-qty').value)||0,r:{press:gg('c-press'),label:gg('c-label'),inner:gg('c-inner'),sleeve:gg('c-sleeve'),pack:gg('c-pack')||0.05,shrink:gg('c-shrink'),energy:gg('c-energy')||0.08,varnish:gg('c-varnish'),sticker:gg('c-sticker'),ovebag:gg('c-ovebag')},f:{master:gg('f-master'),metal:gg('f-metal'),tests:gg('f-tests'),testDel:gg('f-testdel'),delivery:gg('f-delivery')},extra:extraFixed,extraItems:[],total:gg('c-total')};
  if(!d.total)d.total=varT(d)+fixT(d);
  ALL.push(d);
  document.getElementById('import-msg').textContent=`✓ ${ref} ajouté — ${d.qty} ex. · ${f2(d.total)}`;
  sw('releases');
}

const PANELS=['sim','paliers','rates','releases','invoices','import'];
const RENDER={sim:renderSim,paliers:renderPaliers,rates:renderRates,releases:renderReleases,invoices:renderInvoices,import:renderImport};
function rerender(){
  const on=document.querySelector('.tab.on');
  if(!on)return;
  const id=PANELS[[...document.querySelectorAll('.tab')].indexOf(on)];
  if(id&&RENDER[id])RENDER[id]();
}
function sw(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  const idx=PANELS.indexOf(id);
  document.querySelectorAll('.tab')[idx].classList.add('on');
  document.getElementById('panel-'+id).classList.add('on');
  if(RENDER[id])RENDER[id]();
}

document.getElementById('doc-count').textContent=ALL.length+' documents · '+ALL.filter(d=>d.type==='inv').length+' factures';
renderSim();
renderImport();
fetchFx();
</script>
</body>
</html>
