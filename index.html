.tabs{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:24px;}

.tab:hover{color:#1a1a1a;}

.panel{display:none;}.panel.on{display:block;}
.slabel{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#999;margin:24px 0 10px;}

.war-banner span{font-size:11px;color:#7a5500;}

.palier-tag{display:inline-block;font-size:12px;font-weight:500;padding:5px 14px;border-radius:999px;}

.metric{background:#f4f4f4;border-radius:8px;padding:12px 14px;}
.metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#999;margin-bottom:5px;}
.metric-val{font-size:17px;font-weight:500;color:#1a1a1a;}

.metric.big{background:#dbeeff;}

.metric.big .metric-eur{font-size:13px;color:#1a4f8a;}
.metric.war{background:#fff3cd;}
.metric.war .metric-val{color:#7a5500;}
.metric.war .metric-eur{color:#7a5500;}

.palier-group{margin-bottom:22px;}

table{width:100%;border-collapse:collapse;}

function getReleases(){
  const map={};
  ALL.filter(d=>d.qty>0&&d.r.press>0).forEach(d=>{
    if(!map[d.cat])map[d.cat]={cat:d.cat,fmt:d.fmt,refs:[],qty:0,press:d.r.press};

}

        <option value="no">Non — pressage seul</option>
      </select></div>
  </div>
  <div id="sim-result"></div>`;
  calcSim();
}

function calcSim(){
  const el=id=>document.getElementById(id);
  if(!el('s-fmt'))return;
  const fmt=el('s-fmt').value;
  const qty=parseInt(el('s-qty').value)||300;
  const press=pressRate(fmt,qty);
  const inner=parseFloat(el('s-inner').value)||0;
  const sleeve=parseFloat(el('s-sleeve').value)||0;
  const lbl=parseFloat(el('s-label').value)||0;
  const sticker=parseFloat(el('s-sticker').value)||0;
  const varnish=parseFloat(el('s-varnish').value)||0;
  const diecut=parseFloat(el('s-diecut').value)||0;
  const del=parseFloat(el('s-del').value)||85;
  const incFixed=el('s-fixed').value==='yes';
  const war=warOn()?WAR_SURCHARGE:0;
  const pack=0.05,shrink=0.14,energy=0.08;
  const pu=press+lbl+inner+sleeve+pack+shrink+energy+varnish+sticker+war;
  const vt=pu*qty;
  const mf=fmt==='7'?160:212,mw=fmt==='7'?100:159;
  const ft=incFixed?(mf+mw+25+35):0;
  const total=vt+ft+del+diecut;
  const pColor=press<=0.88?{bg:'#d4edda',fg:'#1a5a1a'}:press<=0.97?{bg:'#dbeeff',fg:'#1a4f8a'}:{bg:'#fde8e8',fg:'#8a1a1a'};
  const plbl=press===0.88?'Palier A — £0.88/u (≥ 1500 ex.)':press===0.97?'Palier B — £0.97/u (500–1499 ex.)':press===0.95?'7" — £0.95/u':'Palier C — £1.25/u (≤ 499 ex.)';
  el('sim-result').innerHTML=`
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
    <span class="palier-tag" style="background:${pColor.bg};color:${pColor.fg};">${plbl}</span>
    <span style="font-size:11px;color:#888;">pour ${qty.toLocaleString()} ex.</span>
    ${diecut>0?`<span class="palier-tag" style="background:#fff3cd;color:#7a5500;">+ die-cut £400</span>`:''}
    ${war>0?`<span class="palier-tag" style="background:#fff3cd;color:#7a5500;">+ surcharge guerre £0.09/u</span>`:''}
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Pressage / u</div><div class="metric-val">${fpu(press)}</div><div class="metric-eur">${epu(press)}</div></div>
    ${war>0?`<div class="metric war"><div class="metric-label">Surcharge guerre / u</div><div class="metric-val">£0.09</div><div class="metric-eur">≈ ${fe(0.09)}</div></div>`:''}
    <div class="metric"><div class="metric-label">Variable / u</div><div class="metric-val">${f2(pu)}</div><div class="metric-eur">${fe(pu)}</div></div>
    <div class="metric"><div class="metric-label">Variables total</div><div class="metric-val">${f2(vt)}</div><div class="metric-eur">${fe(vt)}</div></div>
    <div class="metric"><div class="metric-label">Fixes</div><div class="metric-val">${f2(ft)}</div><div class="metric-eur">${fe(ft)}</div></div>
    ${diecut>0?`<div class="metric"><div class="metric-label">Die-cut</div><div class="metric-val">${f2(diecut)}</div><div class="metric-eur">${fe(diecut)}</div></div>`:''}
    <div class="metric"><div class="metric-label">Livraison</div><div class="metric-val">${f2(del)}</div><div class="metric-eur">${fe(del)}</div></div>
    <div class="metric big"><div class="metric-label">Total</div><div class="metric-val">${f2(total)}</div><div class="metric-eur">${fe(total)}</div></div>
    <div class="metric"><div class="metric-label">Prix / u tout compris</div><div class="metric-val">${f2(total/qty)}</div><div class="metric-eur">${fe(total/qty)}</div></div>
  </div>`;
}

// ── PALIERS ──
function renderPaliers(){
  const rels=getReleases();
  const PALIERS=[
    {press:0.88,label:'≥ 1500 ex.',fg:'#1a5a1a',bg:'#3B6D11'},
    {press:0.97,label:'500 – 1499 ex.',fg:'#1a4f8a',bg:'#185FA5'},
    {press:1.02,label:'500 ex. avec die-cut',fg:'#7a5500',bg:'#854F0B'},
    {press:1.25,label:'≤ 499 ex.',fg:'#8a1a1a',bg:'#A32D2D'},
    {press:0.95,label:'7" standard',fg:'#5a3a00',bg:'#6B3E00'},
  ];
  let h='<p style="font-size:11px;color:#888;margin-bottom:20px;">Quantités totales par release — plusieurs factures peuvent correspondre à la même commande livrée en plusieurs fois.</p>';
  PALIERS.forEach(p=>{
    const group=rels.filter(r=>r.press===p.press);
    if(!group.length)return;
    h+=`<div class="palier-group"><div class="palier-head">
      <span class="palier-price" style="color:${p.fg};">${fpu(p.press)}</span>
      <span class="palier-sub">${p.label}</span>
      <span class="palier-eur">${epu(p.press)}</span>
    </div><div class="palier-rows">`;
    group.forEach(r=>{
      const pct=Math.min(Math.round(r.qty/2200*100),100);
      h+=`<div class="palier-row">
        <span class="palier-cat">${r.cat}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct,2)}%;background:${p.bg};opacity:.75;"></div></div>
        <span class="palier-qty">${r.qty.toLocaleString()} ex.</span>
        <span class="palier-refs">${r.refs.join(', ')}</span>
        <span class="palier-title">${T(r.cat)}</span>
      </div>`;
    });
    h+='</div></div>';
  });
  h+=`<div class="insight">
    <strong>Paliers estimés :</strong> £1.25 (≤ 499 ex.) → £0.97 (500–1499 ex.) → £0.88 (≥ 1500 ex.)<br>
    <strong>Surcharge guerre (août 2026+) :</strong> +£0.09/u sur tout pressage (GZ via AGR) — temporaire, réévaluée trimestriellement.
  </div>`;
  document.getElementById('panel-paliers').innerHTML=h;
}

// ── TARIFS ──
function renderRates(){
  const inv12=ALL.filter(d=>d.type==='inv'&&d.fmt==='12'&&d.qty>0);
  const ITEMS=[{k:'press',l:'Pressage 12"'},{k:'label',l:'Labels'},{k:'inner',l:'Inner bag'},{k:'sleeve',l:'Pochette'},{k:'pack',l:'Packing'},{k:'shrink',l:'Shrinkwrap'},{k:'energy',l:'Energy'},{k:'varnish',l:'Matt varnish'},{k:'sticker',l:'Sticker + appli'}];
  let h=`<div class="slabel">Tarifs unitaires 12" — base historique</div><div class="rate-grid">`;
  ITEMS.forEach(item=>{
    const vals=inv12.map(d=>d.r[item.k]).filter(v=>v>0);
    if(!vals.length)return;
    const mn=Math.min(...vals),mx=Math.max(...vals);
    const last=inv12.filter(d=>d.r[item.k]>0).slice(-1)[0].r[item.k];
    h+=`<div class="rate-card"><div class="rate-label">${item.l}</div><div class="rate-val">${fpu(last)}</div><div class="rate-eur">${epu(last)}</div>${mn!==mx?`<div class="rate-range">obs. ${fpu(mn)} – ${fpu(mx)}</div>`:''}</div>`;
  });
  h+=`<div class="rate-card" style="border:1px solid #ffe082;"><div class="rate-label" style="color:#7a5500;">Die-cut sleeve</div><div class="rate-val">£400</div><div class="rate-eur">${fe(400)}</div><div class="rate-range">Fixe si pochette découpée</div></div>`;
  h+=`<div class="rate-card" style="border:1px solid #ffe082;background:#fffbf0;"><div class="rate-label" style="color:#7a5500;">⚠ Surcharge guerre</div><div class="rate-val" style="color:#7a5500;">+£0.09/u</div><div class="rate-eur" style="color:#7a5500;">≈ +${fe(0.09)}/u</div><div class="rate-range">À partir du 1er août 2026</div></div>`;
  h+='</div>';
  const inv7=ALL.filter(d=>d.type==='inv'&&d.fmt==='7'&&d.qty>0);
  if(inv7.length){
    h+=`<div class="slabel">Tarifs unitaires 7"</div><div class="rate-grid">`;
    [{k:'press',l:'Pressage'},{k:'label',l:'Labels'},{k:'inner',l:'Inner'},{k:'sleeve',l:'Sleeve'}].forEach(it=>{
      const vals=inv7.map(d=>d.r[it.k]).filter(v=>v>0);
      if(!vals.length)return;
      h+=`<div class="rate-card"><div class="rate-label">${it.l}</div><div class="rate-val">${fpu(Math.min(...vals))}</div><div class="rate-eur">${epu(Math.min(...vals))}</div></div>`;
    });
    h+=`<div class="rate-card"><div class="rate-label">Mastering 7"</div><div class="rate-val">£160</div><div class="rate-eur">${fe(160)}</div></div>`;
    h+=`<div class="rate-card"><div class="rate-label">Metalwork 7"</div><div class="rate-val">£100</div><div class="rate-eur">${fe(100)}</div></div>`;
    h+='</div>';
  }
  h+=`<div class="slabel">Coûts fixes 12"</div><table><thead><tr><th class="l">Poste</th><th>£</th><th>€</th><th class="l">Note</th></tr></thead><tbody>
  <tr><td class="l muted">Mastering DMM</td><td class="gbp">£212</td><td class="eur">${fe(212)}</td><td class="l muted">Constant</td></tr>
  <tr><td class="l muted">Metalwork</td><td class="gbp">£159</td><td class="eur">${fe(159)}</td><td class="l muted">Constant</td></tr>
  <tr><td class="l muted">Test Pressings ×5</td><td class="gbp">£25</td><td class="eur">${fe(25)}</td><td class="l muted">£5/u</td></tr>
  <tr><td class="l muted">Livraison tests</td><td class="gbp">£35</td><td class="eur">${fe(35)}</td><td class="l muted">Parfois £0 si groupée</td></tr>
  <tr><td class="l muted">Die-cut sleeve</td><td class="gbp">£400</td><td class="eur">${fe(400)}</td><td class="l muted" style="color:#7a5500;">Si pochette découpée</td></tr>
  <tr><td class="l muted">Livraison marchandise</td><td class="gbp">£50 – £249</td><td class="eur">${fe(50)} – ${fe(249)}</td><td class="l muted">Selon destination et volume</td></tr>
  <tr class="strong"><td class="l">Total fixes typique</td><td class="gbp">£431</td><td class="eur">${fe(431)}</td><td class="l muted">Master + metal + tests + livr. tests</td></tr>
  </tbody></table>`;
  document.getElementById('panel-rates').innerHTML=h;
}

// ── RELEASES ──
function renderReleases(){
  const rels=getReleases();
  let h=`<table><thead><tr><th class="l">Cat. N°</th><th class="l">Titre</th><th>Fmt</th><th>Qté totale</th><th>Press/u £</th><th>Press/u €</th><th>Palier</th><th class="l">Docs</th></tr></thead><tbody>`;
  rels.forEach(r=>{
    const palier=r.press<=0.88?'A ≥1500':r.press===0.95?'7"':r.press<=0.97?'B 500–1499':r.press<=1.02?'B\' die-cut':'C ≤499';
    const cls=r.press<=0.88?'g':r.press>=1.25?'r':'';
    h+=`<tr><td class="l" style="font-weight:500;">${r.cat}</td><td class="l muted" style="font-size:11px;">${T(r.cat)||'—'}</td><td>${r.fmt}"</td><td style="font-weight:500;">${r.qty.toLocaleString()}</td><td class="${cls}">${fpu(r.press)}</td><td class="eur">${epu(r.press)}</td><td style="font-size:10px;">${palier}</td><td class="l muted" style="font-size:10px;">${r.refs.join(', ')}</td></tr>`;
  });
  h+='</tbody></table>';
  const fixOnly=[...new Set(ALL.filter(d=>d.qty===0&&d.type==='inv').map(d=>d.cat))];
  h+=`<p style="font-size:10px;color:#bbb;margin-top:12px;">Factures coûts fixes uniquement : ${fixOnly.map(c=>`${c}${T(c)?' ('+T(c)+')':''}`).join(' · ')}</p>`;
  document.getElementById('panel-releases').innerHTML=h;
}

// ── FACTURES ──
function renderInvoices(){
  let h=`<table><thead><tr><th class="l">Réf.</th><th class="l">Cat.</th><th class="l">Titre</th><th>Date</th><th>Qté</th><th>Press/u</th><th>Total £</th><th>Total €</th></tr></thead><tbody>`;
  ALL.forEach(d=>{
    const tag=d.qty===0?'<span class="badge b-fx">Fixes</span>':d.fmt==='7'?'<span class="badge b-7">7"</span>':d.type==='quote'?'<span class="badge b-qt">Devis</span>':'<span class="badge b-inv">Facture</span>';
    const dieTag=d.extra>0?'<span class="badge" style="background:#fff3cd;color:#7a5500;">die-cut</span>':'';
    h+=`<tr><td class="l" style="font-weight:500;white-space:nowrap;">${d.ref}${tag}${dieTag}</td><td class="l" style="font-size:11px;">${d.cat}</td><td class="l muted" style="font-size:10px;">${T(d.cat)||'—'}</td><td style="font-size:10px;">${d.date||'—'}</td><td>${d.qty||'—'}</td><td>${d.r.press>0?fpu(d.r.press):'—'}</td><td class="gbp">${f2(d.total)}</td><td class="eur">${fe(d.total)}</td></tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('panel-invoices').innerHTML=h;
}

// ── IMPORT ──
function renderImport(){
  document.getElementById('panel-import').innerHTML=`
  <p style="font-size:12px;color:#888;margin-bottom:16px;">Les doublons (même référence) sont ignorés automatiquement.</p>
  <div class="import-grid">
    <div class="import-field"><label>Réf.</label><input type="text" id="i-ref" placeholder="i28xxx"></div>
    <div class="import-field"><label>Type</label><select id="i-type"><option value="inv">Facture</option><option value="quote">Devis</option></select></div>
    <div class="import-field"><label>Date</label><input type="text" id="i-date" placeholder="MM/YYYY"></div>
    <div class="import-field"><label>Format</label><select id="i-fmt"><option value="12">12"</option><option value="7">7"</option></select></div>
    <div class="import-field"><label>Cat. N°</label><input type="text" id="i-cat" placeholder="CAPXXXLP"></div>
    <div class="import-field" style="grid-column:span 2"><label>Titre</label><input type="text" id="i-title" placeholder="Artiste — Titre"></div>
    <div class="import-field"><label>Quantité</label><input type="number" id="i-qty" placeholder="300"></div>
  </div>
  <div class="slabel">Tarifs unitaires (£/u)</div>
  <div class="import-grid">
    <div class="import-field"><label>Pressage</label><input type="number" id="c-press" step="0.01" placeholder="0.97"></div>
    <div class="import-field"><label>Labels</label><input type="number" id="c-label" step="0.01" placeholder="0.20"></div>
    <div class="import-field"><label>Inner</label><input type="number" id="c-inner" step="0.01" placeholder="0.50"></div>
    <div class="import-field"><label>Sleeve</label><input type="number" id="c-sleeve" step="0.001" placeholder="0.83"></div>
    <div class="import-field"><label>Packing</label><input type="number" id="c-pack" step="0.01" placeholder="0.05"></div>
    <div class="import-field"><label>Shrink</label><input type="number" id="c-shrink" step="0.01" placeholder="0.14"></div>
    <div class="import-field"><label>Energy</label><input type="number" id="c-energy" step="0.01" placeholder="0.08"></div>
    <div class="import-field"><label>Varnish</label><input type="number" id="c-varnish" step="0.01" placeholder="0.05"></div>
    <div class="import-field"><label>Sticker+appli</label><input type="number" id="c-sticker" step="0.01" placeholder="0.33"></div>
  </div>
  <div class="slabel">Coûts fixes (£)</div>
  <div class="import-grid">
    <div class="import-field"><label>Mastering</label><input type="number" id="f-master" step="1" placeholder="212"></div>
    <div class="import-field"><label>Metalwork</label><input type="number" id="f-metal" step="1" placeholder="159"></div>
    <div class="import-field"><label>Tests</label><input type="number" id="f-tests" step="1" placeholder="25"></div>
    <div class="import-field"><label>Livr. tests</label><input type="number" id="f-testdel" step="1" placeholder="35"></div>
    <div class="import-field"><label>Livr. march.</label><input type="number" id="f-delivery" step="1" placeholder="85"></div>
    <div class="import-field"><label>Die-cut</label><input type="number" id="f-diecut" step="1" placeholder="0"></div>
    <div class="import-field"><label>Total doc £</label><input type="number" id="c-total" step="0.01"></div>
  </div>
  <button class="add-btn" onclick="addDoc()">+ Ajouter</button>
  <p class="msg" id="import-msg"></p>`;
}

function addDoc(){
  const ref=document.getElementById('i-ref').value.trim()||('DOC-'+Date.now());
  if(ALL.find(d=>d.ref===ref)){document.getElementById('import-msg').textContent='⚠ Doublon ignoré.';return;}
  const gg=id=>parseFloat(document.getElementById(id).value)||0;
  const d={ref,type:document.getElementById('i-type').value,date:document.getElementById('i-date').value||'',fmt:document.getElementById('i-fmt').value,cat:document.getElementById('i-cat').value||'—',qty:parseInt(document.getElementById('i-qty').value)||0,r:{press:gg('c-press'),label:gg('c-label'),inner:gg('c-inner'),sleeve:gg('c-sleeve'),pack:gg('c-pack')||0.05,shrink:gg('c-shrink')||0.14,energy:gg('c-energy')||0.08,varnish:gg('c-varnish'),sticker:gg('c-sticker')},f:{master:gg('f-master'),metal:gg('f-metal'),tests:gg('f-tests'),testDel:gg('f-testdel'),delivery:gg('f-delivery')},extra:gg('f-diecut'),total:gg('c-total')};
  if(!d.total)d.total=varT(d)+fixT(d);
  ALL.push(d);
  document.getElementById('import-msg').textContent=`✓ ${ref} ajouté — ${d.qty} ex. · ${f2(d.total)}`;
  sw('releases');
}

const PANELS=['sim','paliers','rates','releases','invoices','import'];
const RENDER={sim:renderSim,paliers:renderPaliers,rates:renderRates,releases:renderReleases,invoices:renderInvoices,import:renderImport};
function rerender(){
  const on=document.querySelector('.tab.on');
  if(!on)return;
  const id=PANELS[[...document.querySelectorAll('.tab')].indexOf(on)];
  if(id&&RENDER[id])RENDER[id]();
}
function sw(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  const idx=PANELS.indexOf(id);
  document.querySelectorAll('.tab')[idx].classList.add('on');
  document.getElementById('panel-'+id).classList.add('on');
  if(RENDER[id])RENDER[id]();
}

document.getElementById('doc-count').textContent=ALL.length+' documents · '+ALL.filter(d=>d.type==='inv').length+' factures';
renderSim();
renderImport();
fetchFx();
</script>
